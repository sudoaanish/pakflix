name: PAKFLIX Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPECTED_PACKAGE: com.pakflix.tv
      EXPECTED_VERSION_CODE: '210'
      EXPECTED_SIGNER_SHA256: 359dde3161d91c47a020d2ed40a2b2a223272ac5cfc23cba8d35636759830c51
      RELEASE_APK: app/build/outputs/apk/release/pakflix-release.apk
      RELEASE_ASSET: release_assets/pakflix-v0.2.10-release.apk
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Decode PAKFLIX signing keystore
        run: |
          if [ -z "${{ secrets.PAKFLIX_KEYSTORE_BASE64 }}" ]; then
            echo "PAKFLIX_KEYSTORE_BASE64 is required"
            exit 1
          fi
          echo "${{ secrets.PAKFLIX_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/pakflix.keystore"

      - name: Build Release APK
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -Pkeystore.file="$RUNNER_TEMP/pakflix.keystore" \
            -Pkeystore.password="${{ secrets.PAKFLIX_KEYSTORE_PASSWORD }}" \
            -Psigning.key.alias="${{ secrets.PAKFLIX_KEY_ALIAS }}" \
            -Psigning.key.password="${{ secrets.PAKFLIX_KEY_PASSWORD }}"

      - name: Verify Release APK
        run: |
          set -euo pipefail

          if [ ! -f "$RELEASE_APK" ]; then
            echo "Expected release APK was not found: $RELEASE_APK"
            exit 1
          fi

          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"

          BADGING="$("$AAPT" dump badging "$RELEASE_APK")"
          PACKAGE="$(echo "$BADGING" | sed -n "s/^package: name='\([^']*\)'.*/\1/p")"
          VERSION_CODE="$(echo "$BADGING" | sed -n "s/^package:.* versionCode='\([^']*\)'.*/\1/p")"
          DEBUGGABLE="$("$AAPT" dump xmltree "$RELEASE_APK" AndroidManifest.xml | grep -c 'android:debuggable' || true)"
          APKSIGNER_OUTPUT="$("$APKSIGNER" verify --print-certs "$RELEASE_APK" 2>&1)"
          echo "$APKSIGNER_OUTPUT"
          SIGNER_SHA256="$(echo "$APKSIGNER_OUTPUT" \
            | sed -nE 's/.*certificate SHA-256 digest:[[:space:]]*([0-9A-Fa-f:]+).*/\1/ip' \
            | head -n 1 \
            | tr -d ':' \
            | tr '[:upper:]' '[:lower:]')"

          echo "Package: $PACKAGE"
          echo "Version code: $VERSION_CODE"
          echo "Signer SHA-256: $SIGNER_SHA256"

          if [ -z "$SIGNER_SHA256" ]; then
            echo "Unable to parse signer SHA-256 from apksigner output"
            exit 1
          fi

          test "$PACKAGE" = "$EXPECTED_PACKAGE"
          test "$VERSION_CODE" = "$EXPECTED_VERSION_CODE"
          test "$SIGNER_SHA256" = "$EXPECTED_SIGNER_SHA256"
          test "$DEBUGGABLE" = "0"

      - name: Locate & Package Release APK
        run: |
          mkdir -p release_assets
          cp "$RELEASE_APK" "$RELEASE_ASSET"

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
